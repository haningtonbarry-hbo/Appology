<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry 💔</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    overflow: hidden;
}

.container {
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    max-width: 400px;
    position: relative;
}

h1 {
    color: #ff4b5c;
}

p {
    font-size: 18px;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    font-size: 16px;
    margin: 10px;
    transition: 0.3s;
}

#forgiveBtn {
    background-color: #4CAF50;
    color: white;
}

#forgiveBtn:hover {
    transform: scale(1.1);
}

#noBtn {
    background-color: #ff4b5c;
    color: white;
    position: absolute;
}

.heart {
    position: fixed;
    color: red;
    font-size: 20px;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-800px); opacity: 0; }
}
</style>
</head>
<body>

<div class="container">
    <h1>I'm Really Sorry 💔</h1>
    <p id="message">Please forgive me. I truly value our friendship.</p>
    <button id="forgiveBtn" onclick="forgive()">Forgive Me ❤️</button>
    <button id="noBtn" onmouseover="moveButton()">No 😢</button>
</div>

<script>
function forgive() {
    document.getElementById("message").innerHTML = 
    "Thank you 😭❤️ You are the best friend ever!";
    createHearts();
}

function moveButton() {
    let btn = document.getElementById("noBtn");
    btn.style.top = Math.random() * 200 + "px";
    btn.style.left = Math.random() * 200 + "px";
}

function createHearts() {
    setInterval(() => {
        let heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * window.innerWidth + "px";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 5000);
    }, 300);
}
</script>

</body>
</html>
